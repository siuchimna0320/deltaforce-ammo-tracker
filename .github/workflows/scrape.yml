name: Delta Force Ammo Scraper

on:
  workflow_dispatch:

concurrency:
  group: ammo-scraper
  cancel-in-progress: false   # New runs wait for previous to finish

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read           # ⚠️【新加入】：使用 gh run list 必須要有 actions 的讀取權限

    steps:
      # Clone the repository
      - name: Clone repository using git
        run: |
          git clone https://github.com/${{ github.repository }}.git repo
          cd repo
          git checkout ${{ github.ref_name }}

      # 🔍【修正位置】：這段檢查必須放在 Clone 之後，並且要在 repo 資料夾內執行
      - name: Run # List all in-progress runs of this workflow
        working-directory: repo
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # 列出正在執行的 runs（這行會需要 .git 資料夾來判斷是哪一個 repo）
          gh run list --workflow="${{ github.workflow }}" --status=in_progress

      # Setup Python environment
      - name: Setup Python
        working-directory: repo
        run: |
          sudo apt update
          sudo apt install -y python3 python3-pip
          python3 --version

      # Install dependencies for scraping
      - name: Install scraping dependencies
        working-directory: repo
        run: pip3 install requests beautifulsoup4 pandas

      # Run the scraping script with retry
      - name: Run scraper with retry
        working-directory: repo
        timeout-minutes: 10
        run: |
          for i in 1 2 3; do
            python3 scraper.py && break
            echo "Attempt $i failed, retrying in 10 seconds..."
            sleep 10
          done

      # Install PostgreSQL dependencies
      - name: Install PostgreSQL dependencies
        working-directory: repo
        run: pip3 install psycopg2-binary sqlalchemy

      # Write scraped data to PostgreSQL
      - name: Write data to PostgreSQL
        working-directory: repo
        env:
          PGHOST: ${{ secrets.PGHOST }}
          PGPORT: ${{ secrets.PGPORT }}
          PGDATABASE: ${{ secrets.PGDATABASE }}
          PGUSER: ${{ secrets.PGUSER }}
          PGPASSWORD: ${{ secrets.PGPASSWORD }}
        run: python3 csv_to_db.py

      # Commit and push the updated CSV file (the database file is not committed)
      - name: Commit and push changes
        working-directory: repo
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Action"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update ammo prices - $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git HEAD:${{ github.ref_name }}
          fi
