name: Delta Force Ammo Scraper

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Clone repository using git
        run: |
          git clone https://github.com/${{ github.repository }}.git repo
          cd repo
          git checkout ${{ github.ref_name }}

      - name: Setup Python 3.11
        run: |
          sudo apt update
          sudo apt install -y python3.11 python3-pip
          python3.11 --version

      - name: Install dependencies
        working-directory: repo
        run: pip3 install requests beautifulsoup4 pandas

      - name: Run scraper with retry
        working-directory: repo
        timeout-minutes: 10
        run: |
          for i in 1 2 3; do
            python3.11 scraper.py && break
            echo "Attempt $i failed, retrying in 10 seconds..."
            sleep 10
          done

      - name: Commit and push changes
        working-directory: repo
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Action"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update ammo prices - $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:${{ github.ref_name }}
          fi
