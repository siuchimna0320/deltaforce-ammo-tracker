name: Delta Force Ammo Scraper

on:
  workflow_dispatch:

concurrency:
  group: ammo-scraper
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read           

    steps:
      # 1. Clone the repository (加上清理邏輯，防止 Re-run 衝突)
      - name: Clone repository using git
        run: |
          rm -rf repo
          git clone https://github.com/${{ github.repository }}.git repo
          cd repo
          git checkout ${{ github.ref_name }}

      # 🔐【這就是你初版擁有的關鍵步驟】：使用你現有的 AUTHKEY 登入 Tailscale
      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      # 2. List all in-progress runs of this workflow
      - name: Run # List all in-progress runs of this workflow
        working-directory: repo
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh run list --repo "${{ github.repository }}" --workflow="${{ github.workflow }}" --status=in_progress

      # 3. Setup Python environment
      - name: Setup Python
        working-directory: repo
        run: |
          sudo apt update
          sudo apt install -y python3 python3-pip
          python3 --version

      # 4. Install dependencies for scraping
      - name: Install scraping dependencies
        working-directory: repo
        run: pip3 install requests beautifulsoup4 pandas

      # 5. Run the scraping script with retry
      - name: Run scraper with retry
        working-directory: repo
        timeout-minutes: 10
        run: |
          for i in 1 2 3; do
            python3 scraper.py && break
            echo "Attempt $i failed, retrying in 10 seconds..."
            sleep 10
          done

      # 6. Install PostgreSQL dependencies
      - name: Install PostgreSQL dependencies
        working-directory: repo
        run: pip3 install psycopg2-binary sqlalchemy

      # 7. Write scraped data to PostgreSQL (這一步會順利透過 Tailscale IP 連線)
      - name: Write data to PostgreSQL
        working-directory: repo
        env:
          PGHOST: ${{ secrets.PGHOST }}
          PGPORT: ${{ secrets.PGPORT }}
          PGDATABASE: ${{ secrets.PGDATABASE }}
          PGUSER: ${{ secrets.PGUSER }}
          PGPASSWORD: ${{ secrets.PGPASSWORD }}
        run: python3 csv_to_db.py

      # 8. Commit and push the updated CSV file
      - name: Commit and push changes
        working-directory: repo
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Action"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update ammo prices - $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git HEAD:${{ github.ref_name }}
          fi
