name: Delta Force Ammo Scraper

on:
  workflow_dispatch:

concurrency:
  group: ammo-scraper
  cancel-in-progress: false   # Do not cancel old runs; new runs will check and exit

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read           # Required to query workflow run status

    steps:
      # Check if another instance of this workflow is already running
      - name: Check for existing running workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # List all in-progress runs of this workflow
          RUNNING_RUNS=$(gh run list --workflow scrape.yml --status in_progress --json databaseId --jq '.[].databaseId')
          CURRENT_RUN_ID=$(gh run list --limit 1 --json databaseId --jq '.[0].databaseId')
          for run in $RUNNING_RUNS; do
            if [ "$run" != "$CURRENT_RUN_ID" ]; then
              echo "Another workflow run ($run) is already in progress. Exiting this run."
              exit 0
            fi
          done
          echo "No other running workflows, proceeding."

      # Clone the repository
      - name: Clone repository using git
        run: |
          git clone https://github.com/${{ github.repository }}.git repo
          cd repo
          git checkout ${{ github.ref_name }}

      # Setup Python environment
      - name: Setup Python
        run: |
          sudo apt update
          sudo apt install -y python3 python3-pip
          python3 --version

      # Install dependencies for scraping
      - name: Install scraping dependencies
        working-directory: repo
        run: pip3 install requests beautifulsoup4 pandas

      # Run the scraping script with retry
      - name: Run scraper with retry
        working-directory: repo
        timeout-minutes: 10
        run: |
          for i in 1 2 3; do
            python3 scraper.py && break
            echo "Attempt $i failed, retrying in 10 seconds..."
            sleep 10
          done

      # Install PostgreSQL dependencies
      - name: Install PostgreSQL dependencies
        working-directory: repo
        run: pip3 install psycopg2-binary sqlalchemy

      # Write scraped data to PostgreSQL
      - name: Write data to PostgreSQL
        working-directory: repo
        env:
          PGHOST: ${{ secrets.PGHOST }}
          PGPORT: ${{ secrets.PGPORT }}
          PGDATABASE: ${{ secrets.PGDATABASE }}
          PGUSER: ${{ secrets.PGUSER }}
          PGPASSWORD: ${{ secrets.PGPASSWORD }}
        run: python3 csv_to_db.py

      # Commit and push updated CSV file (database file is not committed)
      - name: Commit and push changes
        working-directory: repo
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Action"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update ammo prices - $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:${{ github.ref_name }}
          fi
