name: Delta Force Ammo Scraper

on:
  workflow_dispatch:

# Optional: use concurrency to prevent overlapping runs (alternative to the manual check)
# concurrency:
#   group: ammo-scraper
#   cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read   # Required for gh run list

    steps:
      # 1. Clone the repository first
      - name: Clone repository using git
        run: |
          git clone https://github.com/${{ github.repository }}.git repo
          cd repo
          git checkout ${{ github.ref_name }}

      # 2. Check if another instance of this workflow is already running
      - name: Check for existing running workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: repo
        run: |
          RUNNING=$(gh run list --workflow scrape.yml --status in_progress --json databaseId --jq '.[].databaseId')
          CURRENT=${{ github.run_id }}
          for id in $RUNNING; do
            if [ "$id" != "$CURRENT" ]; then
              echo "Another run ($id) is in progress. Exiting this run."
              exit 0
            fi
          done
          echo "No other running workflows, proceeding."

      # 3. Setup Python environment
      - name: Setup Python
        working-directory: repo
        run: |
          sudo apt update
          sudo apt install -y python3 python3-pip
          python3 --version

      # 4. Install dependencies for scraping
      - name: Install scraping dependencies
        working-directory: repo
        run: pip3 install requests beautifulsoup4 pandas

      # 5. Run the scraping script with retry
      - name: Run scraper with retry
        working-directory: repo
        timeout-minutes: 10
        run: |
          for i in 1 2 3; do
            python3 scraper.py && break
            echo "Attempt $i failed, retrying in 10 seconds..."
            sleep 10
          done

      # 6. Install PostgreSQL dependencies
      - name: Install PostgreSQL dependencies
        working-directory: repo
        run: pip3 install psycopg2-binary sqlalchemy

      # 7. Write scraped data to PostgreSQL
      - name: Write data to PostgreSQL
        working-directory: repo
        env:
          PGHOST: ${{ secrets.PGHOST }}
          PGPORT: ${{ secrets.PGPORT }}
          PGDATABASE: ${{ secrets.PGDATABASE }}
          PGUSER: ${{ secrets.PGUSER }}
          PGPASSWORD: ${{ secrets.PGPASSWORD }}
        run: python3 csv_to_db.py

      # 8. Commit and push the updated CSV file (the database file is not committed)
      - name: Commit and push changes
        working-directory: repo
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Action"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update ammo prices - $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:${{ github.ref_name }}
          fi
