name: Delta Force Ammo Scraper

on:
  schedule:
    - cron: '0 * * * *'   # UTC hour, corresponds to Hong Kong hour+8
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # Ensure Node.js 24 for all actions

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 pandas

      - name: Run scraper with retry (secure version)
        uses: step-security/retry@v3   # Solves Node.js 20 deprecation warning
        with:
          timeout_minutes: 10
          max_attempts: 3
          command: python scraper.py

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Action"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update ammo prices - $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
