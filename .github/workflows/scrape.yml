name: Delta Force Ammo Scraper

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # 1. 连接到 Tailscale 网络
      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      # 2. 验证 Tailscale 状态
      - name: Verify Tailscale connection
        run: tailscale status

      # 3. 克隆仓库
      - name: Clone repository using git
        run: |
          git clone https://github.com/${{ github.repository }}.git repo
          cd repo
          git checkout ${{ github.ref_name }}

      # 4. 设置 Python
      - name: Setup Python
        run: |
          sudo apt update
          sudo apt install -y python3 python3-pip
          python3 --version

      # 5. 安装抓取依赖
      - name: Install scraping dependencies
        working-directory: repo
        run: pip3 install requests beautifulsoup4 pandas

      # 6. 运行抓取脚本（带重试）
      - name: Run scraper with retry
        working-directory: repo
        timeout-minutes: 10
        run: |
          for i in 1 2 3; do
            python3 scraper.py && break
            echo "Attempt $i failed, retrying in 10 seconds..."
            sleep 10
          done

      # 7. 安装 PostgreSQL 依赖
      - name: Install PostgreSQL dependencies
        working-directory: repo
        run: pip3 install psycopg2-binary sqlalchemy

      # 8. 调试：打印环境变量（使用硬编码或 Secrets）
      - name: Debug environment variables
        working-directory: repo
        env:
          # 临时硬编码，测试通过后删除并改用 Secrets
          PGHOST: "100.64.0.1"          # 替换为你的 TrueNAS Tailscale IP
          PGPORT: "5432"
          PGDATABASE: "ammo_db"
          PGUSER: "siuchiman"
          PGPASSWORD: "你的数据库密码"   # 替换为真实密码
        run: |
          echo "PGHOST=$PGHOST"
          echo "PGPORT=$PGPORT"
          echo "PGDATABASE=$PGDATABASE"
          echo "PGUSER=$PGUSER"
          echo "PGPASSWORD length=${#PGPASSWORD}"
          # 测试 TCP 连接
          sudo apt install -y netcat
          nc -zv $PGHOST $PGPORT || echo "Connection failed"

      # 9. 写入数据到 PostgreSQL
      - name: Write data to PostgreSQL
        working-directory: repo
        env:
          # 使用硬编码（测试用），或改用 ${{ secrets.XXX }}
          PGHOST: "100.64.0.1"
          PGPORT: "5432"
          PGDATABASE: "ammo_db"
          PGUSER: "siuchiman"
          PGPASSWORD: "你的数据库密码"
        run: python3 csv_to_db.py

      # 10. 提交 CSV 更新到仓库
      - name: Commit and push changes
        working-directory: repo
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Action"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update ammo prices - $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:${{ github.ref_name }}
          fi
