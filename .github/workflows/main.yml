name: Delta Force Ammo Scraper

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install pandas playwright
          playwright install --with-deps chromium
      
      - name: Run scraper
        run: python scraper.py
      
      - name: Show result
        run: |
          echo "=== Latest data ==="
          if [ -f ammo_prices_wide.csv ]; then
            tail -n 5 ammo_prices_wide.csv
          else
            echo "CSV file not created yet"
          fi
